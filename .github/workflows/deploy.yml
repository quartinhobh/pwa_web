name: Deploy

on:
  push:
    tags: ['v*']

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: curl -sf "${{ secrets.RENDER_DEPLOY_HOOK }}"

  deploy-frontend:
    needs: deploy-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web
        run: bun run --filter=web build
        env:
          VITE_FIREBASE_CONFIG: ${{ secrets.VITE_FIREBASE_CONFIG }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Firebase (hosting + firestore rules + firestore indexes)
        run: bunx firebase-tools deploy --only hosting,firestore:rules,firestore:indexes --project ${{ secrets.FIREBASE_PROJECT_ID }} --token "${{ secrets.FIREBASE_TOKEN }}"

  smoke:
    name: Post-deploy smoke tests
    needs: [deploy-api, deploy-frontend]
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: https://pwa-web-njxj.onrender.com
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Wait for Render deploy to be live
        run: |
          for i in {1..60}; do
            if curl -sf "$API_BASE_URL/health" >/dev/null; then
              echo "API is live after ${i} attempts"
              exit 0
            fi
            echo "waiting for $API_BASE_URL/health ($i/60)..."
            sleep 10
          done
          echo "API did not come up in time"
          exit 1

      - name: Discover routes and generate smoke file
        working-directory: ${{ github.workspace }}
        run: |
          (cd api && NODE_ENV=test bun run scripts/list-routes.ts) > routes-smoke.json
          cat routes-smoke.json
          node scripts/generate-smoke-hurl.mjs < routes-smoke.json > smoke-auto.hurl
          cat smoke-auto.hurl scripts/smoke-extras.hurl > smoke-all.hurl
          echo "--- final smoke file ---"
          cat smoke-all.hurl

      - name: Install hurl
        run: |
          HURL_VERSION=6.0.0
          curl -sSLO "https://github.com/Orange-OpenSource/hurl/releases/download/${HURL_VERSION}/hurl_${HURL_VERSION}_amd64.deb"
          sudo dpkg -i "hurl_${HURL_VERSION}_amd64.deb"
          hurl --version

      - name: Run smoke tests against production
        run: hurl --variable base_url=$API_BASE_URL --test smoke-all.hurl
