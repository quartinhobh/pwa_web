name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.20'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint ${{ matrix.workspace }}
        run: bun run --filter=${{ matrix.workspace }} lint
        continue-on-error: false

      - name: Typecheck ${{ matrix.workspace }}
        run: bun run --filter=${{ matrix.workspace }} typecheck

      - name: Test ${{ matrix.workspace }}
        run: bun run --filter=${{ matrix.workspace }} test
